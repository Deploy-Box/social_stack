name: Build, Push and Register Stack

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  STACK_TYPE: "SOCIAL"
  STACK_VARIANT: "BASIC"
  STACK_VERSION: "1.0"

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Resolve environment from branch
        id: resolve
        run: |
          case "${GITHUB_REF_NAME}" in
            main) echo "environment=prod" >> "$GITHUB_OUTPUT" ;;
            test) echo "environment=test" >> "$GITHUB_OUTPUT" ;;
            *)    echo "environment=dev"  >> "$GITHUB_OUTPUT" ;;
          esac

  build:
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and Push Backend Docker image to Azure
        run: |
          IMAGE_NAME=$(echo "${{ vars.ACR_NAME }}.azurecr.io/${{ vars.STACK }}-backend" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_NAME backend
          docker push $IMAGE_NAME

      - name: Build and Push Frontend Docker image to Azure
        run: |
          IMAGE_NAME=$(echo "${{ vars.ACR_NAME }}.azurecr.io/${{ vars.STACK }}-frontend" | tr '[:upper:]' '[:lower:]')
          docker build -t $IMAGE_NAME frontend
          docker push $IMAGE_NAME

  upload:
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.environment }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Zip source_code directory
        run: |
          zip -r source_code.zip .

      - name: Upload source_code.zip to Azure Blob Storage
        run: |
          az storage blob upload \
            --account-name ${{ vars.AZURE_STORAGE_ACCOUNT }} \
            --container-name ${{ vars.AZURE_STORAGE_CONTAINER }} \
            --name $(echo "${{ vars.STACK }}.zip" | tr '[:upper:]' '[:lower:]') \
            --file source_code.zip \
            --overwrite

  register-stack:
    needs: [resolve-env, build, upload]
    uses: Deploy-Box/deploy-box-platform/.github/workflows/register-stack.yml@dev
    with:
      stack_type: "SOCIAL"
      stack_variant: "BASIC"
      stack_version: "1.0"
      stack_name: "Social Stack"
      description: "Full-stack social media platform with React Native frontend, Express.js backend, PostgreSQL, WorkOS auth, image uploads, and real-time messaging."
      features: '["React Native + Expo", "Express.js API", "PostgreSQL Database", "WorkOS Authentication", "Azure Blob Storage", "Real-time Messaging (Socket.IO)", "Custom Subdomain"]'
      stack_infrastructure: '[{"resource_type":"AZURERM_RESOURCE_GROUP"},{"resource_type":"AZURERM_LOG_ANALYTICS_WORKSPACE"},{"resource_type":"AZURERM_CONTAINER_APP_ENVIRONMENT"},{"resource_type":"AZURERM_STORAGE_ACCOUNT"},{"resource_type":"AZURERM_STORAGE_CONTAINER"},{"resource_type":"AZURERM_CONTAINER_APP"},{"resource_type":"AZURERM_CONTAINER_APP"},{"resource_type":"DEPLOYBOXRM_WORKOS_INTEGRATION"},{"resource_type":"DEPLOYBOXRM_POSTGRES_DATABASE"},{"resource_type":"DEPLOYBOXRM_EDGE"}]'
      source_code_location: "social_stack.zip"
      price_id: "price_social_basic"
      environment: ${{ needs.resolve-env.outputs.environment }}
    secrets:
      DEPLOYBOX_DB_HOST: ${{ secrets.DEPLOYBOX_DB_HOST }}
      DEPLOYBOX_DB_PORT: ${{ secrets.DEPLOYBOX_DB_PORT }}
      DEPLOYBOX_DB_NAME: ${{ secrets.DEPLOYBOX_DB_NAME }}
      DEPLOYBOX_DB_USER: ${{ secrets.DEPLOYBOX_DB_USER }}
      DEPLOYBOX_DB_PASSWORD: ${{ secrets.DEPLOYBOX_DB_PASSWORD }}

